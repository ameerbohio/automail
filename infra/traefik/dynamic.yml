tls:
  # Browser-facing edge certificate (self-signed) for the routed public
  # hostnames. Generated by infra/certs/gen-edge-certs.sh into infra/traefik/,
  # which is mounted at /personal/automail/traefik/dynamic. This is the edge trust domain
  # (browser <-> Traefik) -- entirely separate from the internal mTLS CA
  # (infra/certs/gen.sh, cloud <-> printer). sniStrict below hard-rejects any
  # handshake whose SNI has no matching cert, so this MUST exist before
  # `docker compose up` or the front door fails with unrecognized_name.
  certificates:
    - certFile: /personal/automail/traefik/dynamic/edge-cert.pem
      keyFile: /personal/automail/traefik/dynamic/edge-key.pem
  stores:
    default:
      # Replaces Traefik's built-in throwaway self-signed default so direct-IP /
      # healthcheck hits also get this cert instead of an unknown one.
      defaultCertificate:
        certFile: /personal/automail/traefik/dynamic/edge-cert.pem
        keyFile: /personal/automail/traefik/dynamic/edge-key.pem
  options:
    default:
      minVersion: VersionTLS13
      # Kept ON: the edge cert above satisfies SNI for the routed hostnames, so
      # strictness costs nothing and stays consistent with the project's
      # strict-by-default posture (mTLS on every internal hop). Do not disable
      # this to "fix" a missing cert -- generate the cert instead.
      sniStrict: true

http:
  middlewares:
    secure-headers:
      headers:
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        contentSecurityPolicy: "default-src 'self'"
        frameDeny: true
        contentTypeNosniff: true
        referrerPolicy: "no-referrer"
    # plans/02-security.md §6: 20 req/min per IP on upload + job submission endpoints.
    guest-ratelimit:
      rateLimit:
        average: 20
        period: 1m
