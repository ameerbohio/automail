services:
  traefik:
    image: traefik:v3.0
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls.options=default@file"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/traefik:/etc/traefik/dynamic:ro
    networks:
      - automail

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
      # Official postgres image runs every *.sql in this dir, once, on
      # first init of an empty data volume -- the Phase 1 "migration
      # runner" (see services/cloud/db/schema.sql header comment).
      - ./services/cloud/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - automail

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - automail

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      # SSE-S3 default encryption via a static single-key KMS (no external
      # KES/Vault needed for the prototype) -- second encryption layer on
      # top of the browser's E2EE, see docs/study/04-sse-s3-vs-e2ee.md.
      MINIO_KMS_SECRET_KEY: ${MINIO_KMS_SECRET_KEY}
    volumes:
      - minio_data:/data
    networks:
      - automail

  cloud-server:
    build: ./services/cloud
    depends_on:
      - postgres
      - redis
      - minio
    environment:
      PORT: 8080
      MTLS_PORT: 8443
      MTLS_CA_CERT_PATH: /certs/ca-cert.pem
      MTLS_CLOUD_CERT_PATH: /certs/cloud-server-cert.pem
      MTLS_CLOUD_KEY_PATH: /certs/cloud-server-key.pem
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_SECURE: "false"
      JWT_PRIVATE_KEY_PATH: /certs/jwt-private.pem
      JWT_PUBLIC_KEY_PATH: /certs/jwt-public.pem
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY}
    volumes:
      - ./infra/certs:/certs:ro
    # No host port for 8443: verify mTLS from inside the network instead, e.g.
    #   docker compose exec cloud-server curl --cert /certs/printer-cert.pem \
    #     --key /certs/printer-key.pem --cacert /certs/ca-cert.pem \
    #     https://localhost:8443/internal/healthz
    # Keeps `--scale cloud-server=2` (Phase 0 verify) working, since no two
    # replicas need to share a host port.
    networks:
      - automail
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.cloud-server.loadbalancer.server.port=8080"
      # Unauthenticated, abuse-prone endpoints (guest job submission, recipient
      # search) get rate-limited; the more specific rule wins over the
      # catch-all router below without needing an explicit priority.
      - "traefik.http.routers.cloud-server-guest.rule=Host(`api.automail.local`) && (PathPrefix(`/jobs`) || PathPrefix(`/recipients`))"
      - "traefik.http.routers.cloud-server-guest.entrypoints=websecure"
      - "traefik.http.routers.cloud-server-guest.tls=true"
      - "traefik.http.routers.cloud-server-guest.tls.options=default@file"
      - "traefik.http.routers.cloud-server-guest.service=cloud-server"
      - "traefik.http.routers.cloud-server-guest.middlewares=secure-headers@file,guest-ratelimit@file"
      - "traefik.http.routers.cloud-server.rule=Host(`api.automail.local`)"
      - "traefik.http.routers.cloud-server.entrypoints=websecure"
      - "traefik.http.routers.cloud-server.tls=true"
      - "traefik.http.routers.cloud-server.tls.options=default@file"
      - "traefik.http.routers.cloud-server.middlewares=secure-headers@file"

  printer:
    build: ./services/printer
    depends_on:
      - cloud-server
    environment:
      MAILBOX_ID: ${DEV_MAILBOX_ID:-00000000-0000-0000-0000-000000000001}
      CLOUD_SERVER_WS_URL: wss://cloud-server:8443/internal/printer-link
      MTLS_CA_CERT_PATH: /certs/ca-cert.pem
      MTLS_CERT_PATH: /certs/printer-cert.pem
      MTLS_KEY_PATH: /certs/printer-key.pem
      HEARTBEAT_INTERVAL: "30"
      RECONNECT_MAX_BACKOFF: "30"
      # Production values (Phase 10). DEV_MODE defaults to false so a real
      # deploy prints; local dev/e2e set DEV_MODE=true in .env or the e2e
      # override to skip the physical lp call. PRINTER_NAME is the host CUPS
      # queue (docs/cups-host-setup.md Step 1).
      DEV_MODE: "${DEV_MODE:-false}"
      LISTEN_ADDR: ":8444"
      # Document-decryption key (Phase 6). Required even in DEV_MODE: dev mode
      # still runs the full RSA/AES decrypt and only skips the physical lp
      # call. Generate the key first with:
      #   PRINTER_KEY_PASSPHRASE=... ./infra/certs/gen-printer-keys.sh
      PRINTER_PRIVATE_KEY_PATH: /certs/printer-private.pem
      PRINTER_KEY_PASSPHRASE: ${PRINTER_KEY_PASSPHRASE:-changeme-printer-passphrase}
      PRINTER_NAME: ${PRINTER_NAME:-Canon_MF240}
    volumes:
      - ./infra/certs:/certs:ro
      # Phase 10: reach the host's cupsd so `lp` can print. The host mounts
      # /var/spool/cups on tmpfs, so CUPS spool files stay RAM-backed and remain
      # inside the "plaintext only in RAM+tmpfs" invariant (plans/02-security.md).
      # Harmless in DEV_MODE (lp is never called). Some distros use /var/run/cups.
      - /run/cups/cups.sock:/run/cups/cups.sock
    networks:
      - automail
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8444/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  portal:
    build: ./services/portal
    networks:
      - automail
    environment:
      # Server-side base URL for the Next.js API proxy routes (app/api/*).
      # Never exposed to the browser -- all browser calls hit same-origin /api.
      CLOUD_API_URL: http://cloud-server:8080
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portal.rule=Host(`automail.local`)"
      - "traefik.http.routers.portal.entrypoints=websecure"
      - "traefik.http.routers.portal.tls=true"
      - "traefik.http.routers.portal.tls.options=default@file"
      - "traefik.http.routers.portal.middlewares=secure-headers@file"
      - "traefik.http.services.portal.loadbalancer.server.port=3000"

networks:
  automail:

volumes:
  pg_data:
  redis_data:
  minio_data:
