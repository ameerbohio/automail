services:
  traefik:
    # v3.0 (Apr 2024) vendors an old Docker-client SDK that fails Docker API
    # version negotiation against modern Engines (the VM runs Docker 29.x):
    # the client's max API version is below the daemon's minimum, so the
    # provider's handshake is hard-rejected in a loop instead of negotiating
    # down. The Docker provider then discovers zero containers, so no routers
    # exist (routes live entirely in the labels below; dynamic.yml has only
    # TLS + middleware) -- every request 404s regardless of host/protocol.
    # v3.6 vendors a client new enough to negotiate correctly. Pinned (not
    # :latest) for reproducible deploys -- see docs/deploy-checklist.md for the
    # minimum tag a given Engine version needs.
    image: traefik:v3.6
    environment:
      # Belt-and-braces alongside the image pin: fixes the client's API version
      # explicitly so the provider never depends on auto-negotiation succeeding.
      # Setting this DISABLES negotiation, so it is a floor, not a free win:
      # API 1.46 ships with Engine 27.0, and on an older Engine (24.x tops out at
      # 1.43, 25.x at 1.44, 26.x at 1.45) the provider is rejected as "too new" --
      # reproducing the exact blanket-404 this was added to prevent. Engine >=27.0
      # is therefore a host prerequisite; see docs/deploy-checklist.md §0.
      - DOCKER_API_VERSION=1.46
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls.options=default"
    # The only ports this stack publishes. Overridable so a host that already has
    # 80/443 taken can still run the production profile unchanged -- `make
    # deploy-smoke` uses this on WSL2, where Windows holds both. Leave at the
    # defaults on a real deploy host: the browser has to reach them by name.
    ports:
      - "${TRAEFIK_HTTP_PORT:-80}:80"
      - "${TRAEFIK_HTTPS_PORT:-443}:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/traefik:/etc/traefik/dynamic:ro
    networks:
      - automail

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
      # Official postgres image runs every *.sql in this dir, once, on
      # first init of an empty data volume -- the Phase 1 "migration
      # runner" (see services/cloud/db/schema.sql header comment).
      - ./services/cloud/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - automail
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - automail
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    # Pinned to a `-cpuv1` variant on purpose -- do NOT bump to :latest or a bare
    # RELEASE tag. Since RELEASE.2023-11-01T01-57-10Z, MinIO's default image is
    # based on RHEL9/UBI9, whose glibc hard-requires the x86-64-v2 microarch
    # baseline (SSE4.2/POPCNT/...). On a deploy host whose CPU predates that
    # baseline (e.g. the Proxmox target's AMD A6-3600 "Llano", 2011), the default
    # image dies on boot with `Fatal glibc error: CPU does not support
    # x86-64-v2`, and since cloud-server depends_on minio, that one crash takes
    # the whole stack down. MinIO publishes a parallel `-cpuv1` image built on a
    # v1-compiled base for exactly these CPUs (minio/minio issue #18365, fixed by
    # PR #18370) -- SAME MinIO, so pinning it costs no feature/CVE rollback. This
    # is the newest cpuv1 tag published (2025-09-07). See docs/proxmox-vm-setup.md
    # "Host-CPU compatibility". Modern CPUs run this image fine too.
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      # SSE-S3 default encryption via a static single-key KMS (no external
      # KES/Vault needed for the prototype) -- second encryption layer on
      # top of the browser's E2EE, see docs/study/04-sse-s3-vs-e2ee.md.
      MINIO_KMS_SECRET_KEY: ${MINIO_KMS_SECRET_KEY}
      # The browser PUTs the ciphertext cross-origin (automail.local ->
      # blob.automail.local), so MinIO must answer the CORS preflight. Scoped to
      # the portal's origin rather than "*" (the E2E overrides widen it to "*"
      # because they serve the portal from localhost).
      MINIO_API_CORS_ALLOW_ORIGIN: ${MINIO_CORS_ORIGIN:-https://automail.local}
    volumes:
      - minio_data:/data
    networks:
      - automail
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    # Object storage is browser-facing by design: plans/09-api-contracts.md has
    # the browser PUT the encrypted blob straight to the pre-signed `upload_url`
    # so the cloud server never receives the blob bytes. That only works if the
    # URL names a host the browser can resolve, so MinIO gets its own edge
    # hostname instead of a published port. SigV4 signs the Host header and
    # Traefik passes it through unchanged, so the signature still verifies.
    # No secure-headers middleware here: CSP/frame headers are meaningless on an
    # S3 API response, and the pre-signed URL is the authorization.
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minio.rule=Host(`blob.automail.local`)"
      - "traefik.http.routers.minio.entrypoints=websecure"
      - "traefik.http.routers.minio.tls=true"
      - "traefik.http.routers.minio.tls.options=default"
      - "traefik.http.services.minio.loadbalancer.server.port=9000"

  cloud-server:
    build: ./services/cloud
    # Plain `depends_on: [minio]` only waits for the container to *start*,
    # not for MinIO's server to accept connections -- EnsureBucket (main.go)
    # fatals on the first connection-refused, crashing this container in the
    # race. `condition: service_healthy` makes Compose block until each
    # dependency's own healthcheck passes.
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      PORT: 8080
      MTLS_PORT: 8443
      MTLS_CA_CERT_PATH: /certs/ca-cert.pem
      MTLS_CLOUD_CERT_PATH: /certs/cloud-server-cert.pem
      MTLS_CLOUD_KEY_PATH: /certs/cloud-server-key.pem
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_SECURE: "false"
      # Host the *browser* is told to PUT to. Without this the pre-signed URL is
      # signed against MINIO_ENDPOINT (`minio:9000`) -- a Docker-internal name
      # over plaintext HTTP that no browser can resolve, so every guest upload
      # fails on a fresh deploy. Only the upload PUT URL uses this client;
      # server-side blob ops keep using the internal minio:9000 one.
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-blob.automail.local}
      MINIO_PUBLIC_SECURE: ${MINIO_PUBLIC_SECURE:-true}
      JWT_PRIVATE_KEY_PATH: /certs/jwt-private.pem
      JWT_PUBLIC_KEY_PATH: /certs/jwt-public.pem
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY}
    volumes:
      - ./infra/certs:/certs:ro
    # No host port for 8443: verify mTLS from inside the network instead, e.g.
    #   docker compose exec cloud-server curl --cert /certs/printer-cert.pem \
    #     --key /certs/printer-key.pem --cacert /certs/ca-cert.pem \
    #     https://localhost:8443/internal/healthz
    # Keeps `--scale cloud-server=2` (Phase 0 verify) working, since no two
    # replicas need to share a host port.
    networks:
      - automail
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.cloud-server.loadbalancer.server.port=8080"
      # Unauthenticated, abuse-prone endpoints (guest job submission, recipient
      # search) get rate-limited; the more specific rule wins over the
      # catch-all router below without needing an explicit priority.
      - "traefik.http.routers.cloud-server-guest.rule=Host(`api.automail.local`) && (PathPrefix(`/jobs`) || PathPrefix(`/recipients`))"
      - "traefik.http.routers.cloud-server-guest.entrypoints=websecure"
      - "traefik.http.routers.cloud-server-guest.tls=true"
      - "traefik.http.routers.cloud-server-guest.tls.options=default"
      - "traefik.http.routers.cloud-server-guest.service=cloud-server"
      - "traefik.http.routers.cloud-server-guest.middlewares=secure-headers@file,guest-ratelimit@file"
      - "traefik.http.routers.cloud-server.rule=Host(`api.automail.local`)"
      - "traefik.http.routers.cloud-server.entrypoints=websecure"
      - "traefik.http.routers.cloud-server.tls=true"
      - "traefik.http.routers.cloud-server.tls.options=default"
      - "traefik.http.routers.cloud-server.middlewares=secure-headers@file"

  printer:
    build: ./services/printer
    depends_on:
      - cloud-server
    environment:
      MAILBOX_ID: ${DEV_MAILBOX_ID:-00000000-0000-0000-0000-000000000001}
      # This unit's slot UUID -- must equal the `mailbox_slots.id` row this
      # mailbox owns. The printer reports occupancy keyed by SLOT_ID and the
      # cloud's eligibility check (dispatch/route.go `eligible`) looks it up by
      # the DB id, so a mismatch means no slot is ever found and every job sits
      # in `queued` forever with nothing logged as an error. The printer's own
      # fallback ("slot-1") is a standalone-dev convenience and is NEVER right
      # for a deploy -- set SLOT_ID in .env. See docs/deploy-checklist.md.
      SLOT_ID: ${SLOT_ID:-}
      CLOUD_SERVER_WS_URL: wss://cloud-server:8443/internal/printer-link
      MTLS_CA_CERT_PATH: /certs/ca-cert.pem
      MTLS_CERT_PATH: /certs/printer-cert.pem
      MTLS_KEY_PATH: /certs/printer-key.pem
      HEARTBEAT_INTERVAL: "30"
      RECONNECT_MAX_BACKOFF: "30"
      # Production values (Phase 10). DEV_MODE defaults to false so a real
      # deploy prints; local dev/e2e set DEV_MODE=true in .env or the e2e
      # override to skip the physical lp call. PRINTER_NAME is the host CUPS
      # queue (docs/cups-host-setup.md Step 1).
      DEV_MODE: "${DEV_MODE:-false}"
      LISTEN_ADDR: ":8444"
      # Document-decryption key (Phase 6). Required even in DEV_MODE: dev mode
      # still runs the full RSA/AES decrypt and only skips the physical lp
      # call. Generate the key first with:
      #   PRINTER_KEY_PASSPHRASE=... ./infra/certs/gen-printer-keys.sh
      PRINTER_PRIVATE_KEY_PATH: /certs/printer-private.pem
      PRINTER_KEY_PASSPHRASE: ${PRINTER_KEY_PASSPHRASE:-changeme-printer-passphrase}
      PRINTER_NAME: ${PRINTER_NAME:-Canon_MF240}
    volumes:
      - ./infra/certs:/certs:ro
      # Phase 10: reach the host's cupsd so `lp` can print. The host mounts
      # /var/spool/cups on tmpfs, so CUPS spool files stay RAM-backed and remain
      # inside the "plaintext only in RAM+tmpfs" invariant (plans/02-security.md).
      # Harmless in DEV_MODE (lp is never called). Some distros use /var/run/cups.
      - /run/cups/cups.sock:/run/cups/cups.sock
    networks:
      - automail
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8444/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  portal:
    build: ./services/portal
    networks:
      - automail
    environment:
      # Server-side base URL for the Next.js API proxy routes (app/api/*).
      # Never exposed to the browser -- all browser calls hit same-origin /api.
      CLOUD_API_URL: http://cloud-server:8080
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.portal.loadbalancer.server.port=3000"
      # The browser NEVER contacts api.automail.local: services/portal/lib/api.ts
      # calls same-origin /api/*, which Next proxies server-side to
      # http://cloud-server:8080. So the guest-ratelimit on the cloud-server-guest
      # router below is dead weight for real traffic -- plans/02-security.md §6's
      # "20 req/min per IP on upload and job submission endpoints" only bites if
      # it also sits here, on the origin the browser actually hits. Rate-limiting
      # inside the proxy instead would be useless: every request would arrive
      # from the portal container's single IP.
      # The longer rule outranks the catch-all router by Traefik's default
      # priority (rule length), so no explicit priority is needed.
      - "traefik.http.routers.portal-guest.rule=Host(`automail.local`) && (PathPrefix(`/api/jobs`) || PathPrefix(`/api/recipients`))"
      - "traefik.http.routers.portal-guest.entrypoints=websecure"
      - "traefik.http.routers.portal-guest.tls=true"
      - "traefik.http.routers.portal-guest.tls.options=default"
      - "traefik.http.routers.portal-guest.service=portal"
      - "traefik.http.routers.portal-guest.middlewares=secure-headers@file,guest-ratelimit@file"
      - "traefik.http.routers.portal.rule=Host(`automail.local`)"
      - "traefik.http.routers.portal.entrypoints=websecure"
      - "traefik.http.routers.portal.tls=true"
      - "traefik.http.routers.portal.tls.options=default"
      - "traefik.http.routers.portal.middlewares=secure-headers@file"

networks:
  automail:

volumes:
  pg_data:
  redis_data:
  minio_data:
