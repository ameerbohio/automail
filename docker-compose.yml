services:
  traefik:
    image: traefik:v3.0
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - automail

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
      # Official postgres image runs every *.sql in this dir, once, on
      # first init of an empty data volume -- the Phase 1 "migration
      # runner" (see services/cloud/db/schema.sql header comment).
      - ./services/cloud/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - automail

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - automail

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      # SSE-S3 default encryption via a static single-key KMS (no external
      # KES/Vault needed for the prototype) -- second encryption layer on
      # top of the browser's E2EE, see docs/study/04-sse-s3-vs-e2ee.md.
      MINIO_KMS_SECRET_KEY: ${MINIO_KMS_SECRET_KEY}
    volumes:
      - minio_data:/data
    networks:
      - automail

  cloud-server:
    build: ./services/cloud
    depends_on:
      - postgres
      - redis
      - minio
    environment:
      PORT: 8080
      MTLS_PORT: 8443
      MTLS_CA_CERT_PATH: /certs/ca-cert.pem
      MTLS_CLOUD_CERT_PATH: /certs/cloud-server-cert.pem
      MTLS_CLOUD_KEY_PATH: /certs/cloud-server-key.pem
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_SECURE: "false"
      JWT_PRIVATE_KEY_PATH: /certs/jwt-private.pem
      JWT_PUBLIC_KEY_PATH: /certs/jwt-public.pem
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY}
    volumes:
      - ./infra/certs:/certs:ro
    # 8443 published for local `curl --cert ... --key ... https://localhost:8443/internal/healthz`
    # verification (Phase 1). Don't combine with `--scale cloud-server=2` --
    # two replicas can't both bind the same host port.
    ports:
      - "8443:8443"
    networks:
      - automail
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cloud-server.rule=Host(`api.automail.local`)"
      - "traefik.http.routers.cloud-server.entrypoints=websecure"
      - "traefik.http.routers.cloud-server.tls=true"
      - "traefik.http.services.cloud-server.loadbalancer.server.port=8080"

  portal:
    build: ./services/portal
    networks:
      - automail
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portal.rule=Host(`automail.local`)"
      - "traefik.http.routers.portal.entrypoints=websecure"
      - "traefik.http.routers.portal.tls=true"
      - "traefik.http.services.portal.loadbalancer.server.port=3000"

networks:
  automail:

volumes:
  pg_data:
  redis_data:
  minio_data:
